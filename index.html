<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSTM | Karargah v1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #cc0000; --dark-bg: #02040a; --panel: #0d1117; --accent: #ffcc00; --green: #00ff00; }
        body { background: var(--dark-bg); color: #d1d1d1; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #login-gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); border: 2px solid var(--red); padding: 40px; width: 350px; text-align: center; border-radius: 5px; box-shadow: 0 0 30px rgba(204, 0, 0, 0.2); }
        input { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 12px; margin: 10px 0; outline: none; box-sizing: border-box; }
        .btn-tstm { width: 100%; background: var(--red); color: #fff; border: none; padding: 15px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* ANA PANEL */
        header { background: #000; border-bottom: 2px solid var(--red); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .layout { display: grid; grid-template-columns: 300px 1fr 300px; gap: 10px; padding: 10px; height: calc(100vh - 60px); }
        .panel { background: var(--panel); border: 1px solid #1a2333; padding: 15px; overflow-y: auto; }
        .panel h3 { color: var(--accent); border-bottom: 1px solid var(--red); padding-bottom: 5px; margin-top: 0; font-size: 14px; }
        
        #console { background: #000; color: var(--green); font-size: 11px; padding: 10px; height: 250px; overflow-y: auto; border: 1px solid #222; }
        .tool-btn { background: #0a0e14; border: 1px solid #222; padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .tool-btn:hover { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

<div id="login-gate">
    <div class="login-box">
        <h2 style="color:var(--red)">TSTM GİRİŞ</h2>
        <p style="font-size: 10px;">TÜRKİYE SANAL TERÖRLE MÜCADELE</p>
        <input type="text" id="agent-name" placeholder="AJAN KOD ADI">
        <input type="password" id="agent-pass" placeholder="BİRİM ŞİFRESİ">
        <button class="btn-tstm" onclick="tstmLogin()">SİSTEME BAĞLAN</button>
    </div>
</div>

<header>
    <div style="font-weight: bold; letter-spacing: 2px;">TSTM | KARARGAH</div>
    <div id="status-display" style="font-size: 12px; color: var(--green);">SİSTEM: BEKLEMEDE</div>
</header>

<div class="layout">
    <div class="panel">
        <h3><i class="fa-solid fa-shield-halved"></i> MÜCADELE MODÜLLERİ</h3>
        <div class="tool-btn" onclick="runTool('IP_TRACK')"><i class="fa-solid fa-location-crosshairs"></i> IP İz Sürücü</div>
        <div class="tool-btn" onclick="window.open('https://ihbar.usom.gov.tr')"><i class="fa-solid fa-handcuffs"></i> USOM İhbar Hattı</div>
        <div class="tool-btn" onclick="runTool('C31K_SCAN')"><i class="fa-solid fa-user-secret"></i> C31K Yapılanma Analizi</div>
        <div class="tool-btn" onclick="runTool('DB_RESTORE')"><i class="fa-solid fa-cloud-arrow-down"></i> Verileri Bot'tan Çek</div>
    </div>

    <div class="panel">
        <h3><i class="fa-solid fa-terminal"></i> OPERASYON LOGLARI</h3>
        <div id="console"></div>
    </div>

    <div class="panel">
        <h3><i class="fa-solid fa-database"></i> BOT DATABASE DURUMU</h3>
        <div id="db-status" style="font-size: 10px; color: #888;">Bot: @hukum_pin_bot1 <br> Durum: Senkronize</div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8615703049:AAGCPGH59YdLkvCsHdr1WkYuSWGgyuEfBSQ';
    const CHAT_ID = '@hukum_pin_bot1';
    let currentAgent = "";

    // 1. GİRİŞ VE BOT DATABASE'E IP ATMA
    async function tstmLogin() {
        const name = document.getElementById('agent-name').value;
        const pass = document.getElementById('agent-pass').value;

        if (name && pass === "HÜKÜM_V45") { // Şifreyi buradan değiştirebilirsin
            currentAgent = name;
            localStorage.setItem("tstm_agent", name);
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('status-display').innerText = "AJAN: " + name.toUpperCase();
            
            // IP YAKALAMA VE BOTA ATMA
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            sendToBot(`🛑 GİRİŞ: Ajan ${name} bağlandı. \n🌐 IP: ${ipData.ip}\n🕒 Saat: ${new Date().toLocaleString()}`);
            logToConsole(`Sisteme giriş yapıldı. Hoş geldin Ajan ${name}.`);
        } else {
            alert("KİMLİK DOĞRULANAMADI!");
        }
    }

    // 2. BOTU DATABASE OLARAK KULLANMA (MESAJ GÖNDERME)
    async function sendToBot(msg) {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
        });
    }

    // 3. SİTEDEN ÇIKINCA VERİLERİ BOTA YEDEKLEME
    window.addEventListener("beforeunload", function() {
        const logs = document.getElementById('console').innerText;
        if(currentAgent) {
            // navigator.sendBeacon sayfa kapanırken bile veri gönderilmesini sağlar
            const text = `#YEDEK\nAjan: ${currentAgent}\nSon Loglar: ${logs.slice(-200)}`;
            navigator.sendBeacon(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
        }
    });

    function logToConsole(txt) {
        const c = document.getElementById('console');
        c.innerHTML += `> ${new Date().toLocaleTimeString()}: ${txt}<br>`;
        c.scrollTop = c.scrollHeight;
    }

    function runTool(type) {
        logToConsole(`${type} modülü çalıştırıldı... Veriler bota işleniyor.`);
        sendToBot(`#İŞLEM\nAjan: ${currentAgent}\nTür: ${type}\nDurum: Başarılı`);
    }
</script>
</body>
</html>
