<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM PİN | Güvenli Bankacılık & E-Pin</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #1a237e; --secondary: #0288d1; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* GİRİŞ EKRANI (MODAL) */
        #auth-screen { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 320px; }
        
        /* ANA PANEL */
        header { background: var(--primary); color: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .avatar { width: 40px; height: 40px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .dashboard { padding: 20px 5%; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        
        /* BANKA KARTI TASARIMI */
        .bank-card { background: linear-gradient(135deg, #1a237e, #0d47a1); color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(26,35,126,0.3); position: relative; overflow: hidden; }
        .bank-card::after { content: "HÜKÜM"; position: absolute; right: -20px; bottom: -10px; font-size: 60px; opacity: 0.1; font-weight: 900; }
        .card-label { font-size: 12px; opacity: 0.8; text-transform: uppercase; }
        .card-balance { font-size: 32px; font-weight: bold; margin: 10px 0; }
        
        /* MARKET VE ÜRÜNLER */
        .market-card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .product { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-buy { background: var(--primary); color: white; }
        .btn-debt { background: #e3f2fd; color: var(--secondary); margin-right: 5px; }

        /* PROFİL SAYFASI (GİZLİ) */
        #profile-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .profile-content { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; }

        footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color: var(--primary)">HÜKÜM PİN</h2>
        <p>Devam etmek için giriş yapın</p>
        <input type="email" id="email" placeholder="E-posta" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd;"><br>
        <button class="btn btn-buy" style="width: 100%" onclick="girisYap()">Giriş Yap</button>
        <hr>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>
</div>

<header>
    <h2 style="margin:0">HÜKÜM <span>BANK</span></h2>
    <div class="user-profile" onclick="profilAc()">
        <div id="u-name">Misafir</div>
        <div class="avatar" id="u-avatar">H</div>
    </div>
</header>

<div class="dashboard">
    <div class="bank-card">
        <div class="card-label">Toplam Varlık</div>
        <div class="card-balance" id="main-balance">0,00 ₺</div>
        <div class="card-label">Kredi Borcu: <span id="main-debt">0,00 ₺</span></div>
    </div>

    <div class="market-card">
        <h3 style="margin-top:0; color: var(--primary)">Dijital Mağaza</h3>
        <div class="product">
            <div>
                <strong>Google Play 100 TL</strong><br>
                <small>Stok: <span id="stok-sayi">0</span></small>
            </div>
            <div>
                <button class="btn btn-debt" onclick="satinAl(100, true)">10 TL Borçla Al</button>
                <button class="btn btn-buy" onclick="satinAl(110, false)">Peşin Al</button>
            </div>
        </div>
    </div>
</div>

<div id="profile-modal">
    <div class="profile-content">
        <h3>Kullanıcı Profili</h3>
        <div class="avatar" style="width:80px; height:80px; font-size:30px; margin: 0 auto 15px;">H</div>
        <p><strong id="p-mail">eymen@hukum.com</strong></p>
        <p>İşlem Geçmişi: 0</p>
        <button class="btn btn-buy" onclick="document.getElementById('profile-modal').style.display='none'">Kapat</button>
    </div>
</div>

<footer>
    <span onclick="adminModu()" style="cursor:pointer">© 2026 HÜKÜM PİN | Güvenli Ödeme Altyapısı</span>
</footer>

<script>
    let userData = JSON.parse(localStorage.getItem('hukumUser')) || { bakiye: 0, borc: 0, mail: '', giris: false };
    let stok = JSON.parse(localStorage.getItem('hukumStok')) || [];

    function girisYap() {
        let mail = document.getElementById('email').value;
        if(mail.includes('@')) {
            userData.mail = mail;
            userData.giris = true;
            localStorage.setItem('hukumUser', JSON.stringify(userData));
            ekranGuncelle();
            document.getElementById('auth-screen').style.display = 'none';
        } else { alert("Geçerli bir mail gir aslanım!"); }
    }

    function ekranGuncelle() {
        document.getElementById('main-balance').innerText = userData.bakiye.toFixed(2) + " ₺";
        document.getElementById('main-debt').innerText = userData.borc.toFixed(2) + " ₺";
        document.getElementById('u-name').innerText = userData.mail.split('@')[0];
        document.getElementById('p-mail').innerText = userData.mail;
        document.getElementById('stok-sayi').innerText = stok.length;
    }

    function satinAl(fiyat, borcMu) {
        if(stok.length === 0) return alert("Stokta mermi kalmadı!");
        if(borcMu && userData.borc >= 30) return alert("Borç limitin doldu!");
        
        let gerekliPara = borcMu ? 90 : 110;
        if(userData.bakiye >= gerekliPara) {
            userData.bakiye -= gerekliPara;
            if(borcMu) userData.borc += 10;
            let kod = stok.shift();
            alert("HÜKÜM KODUNUZ: " + kod);
            saveAndSync();
        } else { alert("Yetersiz bakiye!"); }
    }

    function saveAndSync() {
        localStorage.setItem('hukumUser', JSON.stringify(userData));
        localStorage.setItem('hukumStok', JSON.stringify(stok));
        ekranGuncelle();
    }

    function profilAc() { document.getElementById('profile-modal').style.display = 'flex'; }

    function adminModu() {
        let pw = prompt("Komutan Şifresi:");
        if(pw === "Aşko2026") {
            let secim = prompt("1: Bakiye Ekle\n2: Kod Ekle");
            if(secim == "1") userData.bakiye += parseInt(prompt("Miktar:"));
            if(secim == "2") stok.push(prompt("Kod:"));
            saveAndSync();
        }
    }

    if(userData.giris) document.getElementById('auth-screen').style.display = 'none';
    ekranGuncelle();
</script>
</body>
</html>
