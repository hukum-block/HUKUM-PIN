<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM V45 | Digital Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050a14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Matrix Arka Plan Efekti */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }

        /* Degrade Cüzdan Kartı */
        .bank-card {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }

        .bank-card:hover { transform: scale(1.02); }

        /* Kayan Yazı Bandı */
        .marquee {
            background: #facc15;
            color: black;
            font-weight: bold;
            padding: 5px 0;
        }

        /* Admin Gizli Kapı */
        .admin-secret {
            cursor: default;
            user-select: none;
        }

        .hidden-panel { display: none; }
        
        .vip-badge {
            color: #facc15;
            text-shadow: 0 0 10px #facc15;
        }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="marquee overflow-hidden whitespace-nowrap">
    <div class="inline-block animate-marquee">
        🚀 HÜKÜM V45 AKTİF! | YENİ ROBLOX SCRIPT'LERİ EKLENDİ | GÜVENLİK PİN SİSTEMİ DEVREDE!
    </div>
</div>

<div class="container mx-auto px-4 py-8">
    
    <div id="login-screen" class="max-w-md mx-auto bg-gray-900 p-8 rounded-xl border border-blue-900 shadow-2xl">
        <h2 class="text-3xl font-bold text-center mb-6 text-blue-400">HÜKÜM GİRİŞ</h2>
        <input type="text" id="user" placeholder="Kullanıcı Adı" class="w-full p-3 mb-4 bg-gray-800 rounded border border-gray-700">
        <input type="password" id="pass" placeholder="Şifre" class="w-full p-3 mb-4 bg-gray-800 rounded border border-gray-700">
        <button onclick="siteyeGir()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">Mertçe Giriş Yap</button>
        
        <div class="flex justify-between mt-6">
            <button class="bg-red-600 p-2 rounded text-xs">Google</button>
            <button class="bg-indigo-600 p-2 rounded text-xs">Discord</button>
            <button class="bg-blue-800 p-2 rounded text-xs">Facebook</button>
            <button class="bg-gray-700 p-2 rounded text-xs">Steam</button>
        </div>
    </div>

    <div id="main-panel" class="hidden-panel">
        
        <div class="bank-card max-w-sm mx-auto p-6 mb-8 relative">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-xs opacity-75">HÜKÜM KART</p>
                    <h3 id="display-name" class="text-xl font-bold mt-1">Eymen Paşa <span class="vip-badge">★ VIP</span></h3>
                </div>
                <img src="https://img.icons8.com/color/48/000000/chip.png" width="40"/>
            </div>
            <div class="mt-8">
                <p class="text-sm opacity-75">Mevcut Bakiye</p>
                <div class="flex items-center gap-3">
                    <h2 id="balance-text" class="text-3xl font-mono font-bold">1.250,00 ₺</h2>
                    <button onclick="bakiyeGizle()" class="text-xl">👁️</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-900 p-4 rounded-lg border border-yellow-500 border-opacity-30">
                <span class="text-yellow-500 font-bold">🔥 GÜNÜN FIRSATI</span>
                <img src="https://via.placeholder.com/150" class="w-full rounded mt-2">
                <h4 class="mt-2 font-bold">Premium Roblox Script</h4>
                <p class="text-sm text-gray-400">Stok: 12</p>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-xl font-bold text-yellow-400">45,00 ₺</span>
                    <button onclick="satinAl()" class="bg-green-600 px-4 py-1 rounded text-sm">AL</button>
                </div>
            </div>
            </div>

        <div class="mt-10 bg-gray-900 p-6 rounded-xl border border-blue-500">
            <h3 class="text-xl font-bold mb-4">🎰 Hüküm Çarkı (10 TL)</h3>
            <button onclick="carkCevir()" class="bg-blue-600 px-6 py-2 rounded-full hover:bg-yellow-500 transition hover:text-black font-bold">ÇARKI ÇEVİR</button>
            <p id="cark-sonuc" class="mt-3 font-mono"></p>
        </div>

    </div>
</div>

<div onclick="adminPanelAc()" class="fixed bottom-0 right-0 w-10 h-10 admin-secret"></div>

<script>
    // Matrix Efekti
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "010101HUKUMV45EYMEN";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0044ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    // Site Fonksiyonları
    let bakiye = 1250;
    let bakiyeGizli = false;

    function siteyeGir() {
        const pin = prompt("Güvenlik için 4 Haneli PİN girin:"); // 3. Tek Seferlik PİN
        if(pin && pin.length === 4) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden-panel');
            alert("Sisteme Mertçe Giriş Yapıldı. Hoş geldin Paşam!");
        } else {
            alert("Hatalı PİN!");
        }
    }

    function bakiyeGizle() {
        bakiyeGizli = !bakiyeGizli;
        document.getElementById('balance-text').innerText = bakiyeGizli ? "******* ₺" : bakiye.toFixed(2) + " ₺";
    }

    function satinAl() {
        window.location.href = "https://www.tiktok.com/@hukum_v45"; // 13. TikTok Yönlendirme
    }

    function carkCevir() {
        if(bakiye < 10) return alert("Bakiyen yetersiz aslanım.");
        bakiye -= 10;
        const sans = Math.random();
        let mesaj = "";
        if(sans > 0.8) {
            bakiye += 50;
            mesaj = "🔥 KAZANDIN! +50 TL";
        } else {
            mesaj = "❌ Şansına küs paşam, bakiye gitti.";
        }
        document.getElementById('cark-sonuc').innerText = mesaj;
        if(!bakiyeGizli) bakiyeGizle(); bakiyeGizle(); // Güncelleme için
    }

    // 36. Admin Panel (Gizli Kombinasyon)
    function adminPanelAc() {
        const sifre = prompt("ADMIN ŞİFRESİ:");
        if(sifre === "Eyo_pasha15") {
            alert("HÜKÜM KARARGAHINA HOŞ GELDİN KOMUTANIM. \nBakiye: " + bakiye + "\nKasa: 50.000 TL");
        }
    }
</script>

</body>
</html>
