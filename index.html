<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THİT | Karargah v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-blue: #003366; --accent: #ffcc00; --bg: #020205; --text: #e0e0e0; --panel: #0a0c14; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); border: 2px solid var(--main-blue); padding: 50px; border-radius: 5px; width: 400px; text-align: center; box-shadow: 0 0 50px rgba(0,51,102,0.3); }
        input, textarea { width: 100%; background: #000; border: 1px solid #1a1a1a; color: var(--accent); padding: 12px; margin: 8px 0; outline: none; border-radius: 3px; }
        .btn-gov { width: 100%; background: var(--main-blue); color: #fff; border: none; padding: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-gov:hover { border: 1px solid var(--accent); color: var(--accent); background: transparent; }
        header { background: #000; border-bottom: 2px solid var(--main-blue); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; }
        .layout { display: grid; grid-template-columns: 320px 1fr 300px; gap: 10px; padding: 10px; height: calc(100vh - 60px); }
        .panel { background: var(--panel); border: 1px solid #1a1a25; padding: 15px; overflow-y: auto; border-radius: 5px; }
        .panel h3 { color: var(--accent); border-bottom: 1px solid var(--main-blue); padding-bottom: 8px; font-size: 14px; margin-top: 0; }
        .tool-btn { background: #050508; border: 1px solid #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 3px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 10px; }
        .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
        #console { background: #000; color: #0f0; font-size: 10px; padding: 8px; height: 180px; overflow-y: auto; border: 1px solid #111; margin-top: 10px; }
        .result-box { background: #001a00; border: 1px solid #00ff00; padding: 10px; margin-top: 10px; font-size: 11px; color: #0f0; display: none; }
        .loader { color: var(--accent); font-size: 10px; display: none; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="auth-card">
        <h2 style="color: var(--accent);">THİT GİRİŞ</h2>
        <input type="text" id="codename" placeholder="AJAN KOD ADI">
        <input type="password" id="authkey" placeholder="BİRİM ŞİFRE">
        <button class="btn-gov" onclick="systemLogin()">SİSTEME SIZ</button>
    </div>
</div>

<header>
    <div style="color: var(--accent); font-weight: 900; letter-spacing: 2px;">THİT KARARGAH</div>
    <div id="user-tag" style="color:var(--main-blue); font-size: 12px;">YETKİ: BEKLENİYOR...</div>
</header>

<div class="layout">
    <div class="panel">
        <h3><i class="fa-solid fa-crosshairs"></i> SAHA MODÜLLERİ</h3>
        <div class="tool-btn" onclick="triggerTool('IP_SCAN')"><i class="fa-solid fa-globe"></i> Global IP & ISP Sorgu</div>
        <div class="tool-btn" onclick="triggerTool('EXIF_GPS')"><i class="fa-solid fa-map-location-dot"></i> Fotoğraftan Adres (Bot DB)</div>
        <div class="tool-btn" onclick="triggerTool('SQL_INJECT')"><i class="fa-solid fa-database"></i> Panel Açık Tarayıcı</div>
        <div class="tool-btn" onclick="triggerTool('SNOWFLAKE')"><i class="fa-solid fa-snowflake"></i> Discord Hesap Analizi</div>
        <div class="tool-btn" onclick="triggerTool('OSINT_USER')"><i class="fa-solid fa-search"></i> Sosyal Medya Tarama</div>
        
        <div id="tool-loading" class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Veri Tabandan Sorgulanıyor...</div>
        <div id="tool-result" class="result-box"></div>
    </div>

    <div class="panel">
        <h3><i class="fa-solid fa-flag"></i> OPERASYON TAHTASI</h3>
        <div id="op-list"></div>
    </div>

    <div class="panel">
        <h3><i class="fa-solid fa-microchip"></i> SİSTEM DURUMU</h3>
        <div style="font-size: 10px; color: #666;">DATABASE: TELEGRAM @hukum_pin_bot1</div>
        <div id="console"></div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8615703049:AAGCPGH59YdLkvCsHdr1WkYuSWGgyuEfBSQ';
    const CHANNEL_ID = '@hukum_pin_bot1';
    let currentAgent = localStorage.getItem("thit_agent") || "";
    let lastUpdateId = 0;

    window.onload = function() {
        if(currentAgent) loginSuccess(currentAgent);
        setInterval(checkDatabaseUpdates, 3000); // Her 3 saniyede botu/database'i kontrol et
    };

    function logToConsole(txt) {
        const c = document.getElementById('console');
        c.innerHTML += `> ${new Date().toLocaleTimeString()}: ${txt}<br>`;
        c.scrollTop = c.scrollHeight;
    }

    async function systemLogin() {
        const u = document.getElementById('codename').value;
        if(!u) return;
        localStorage.setItem("thit_agent", u);
        loginSuccess(u);
        sendToBot(`🛑 GİRİŞ: Ajan ${u} karargaha bağlandı.`);
    }

    function loginSuccess(u) {
        currentAgent = u;
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('user-tag').innerText = "AJAN: " + u.toUpperCase();
        logToConsole("Sistem aktif. Database senkronize edildi.");
    }

    // BOTU DATABASE OLARAK KULLANAN FONKSİYON
    async function sendToBot(msg) {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: CHANNEL_ID, text: msg })
        });
    }

    // BOT'TAN VERİ ÇEKME (DATABASE OKUMA)
    async function checkDatabaseUpdates() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
            const data = await res.json();
            if(data.result.length > 0) {
                const latest = data.result[0];
                const msg = latest.channel_post ? latest.channel_post.text : (latest.message ? latest.message.text : "");
                
                // Eğer mesaj bir sonuç (#SONUÇ) içeriyorsa ekrana bas
                if(msg.includes("#SONUÇ") && latest.update_id !== lastUpdateId) {
                    lastUpdateId = latest.update_id;
                    showResult(msg);
                }
            }
        } catch(e) {}
    }

    function triggerTool(name) {
        const target = prompt(name + " için hedef girin (ID/Link/User):");
        if(!target) return;

        document.getElementById('tool-loading').style.display = 'block';
        document.getElementById('tool-result').style.display = 'none';
        
        logToConsole(`${name} sorgusu database'e (Bot) iletildi...`);
        sendToBot(`#SORGU\nTür: ${name}\nHedef: ${target}\nAjan: ${currentAgent}`);
    }

    function showResult(msg) {
        document.getElementById('tool-loading').style.display = 'none';
        const resBox = document.getElementById('tool-result');
        resBox.style.display = 'block';
        resBox.innerHTML = `<strong>📡 DATABASE'DEN GELEN VERİ:</strong><br>${msg.replace("#SONUÇ", "")}`;
        logToConsole("Sorgu tamamlandı. Veri ekrana basıldı.");
    }

    // OPERASYON EKLEME (DATABASE'E YAZMA)
    async function submitOp() {
        const t = prompt("Hedef:");
        const n = prompt("Not:");
        if(t) {
            sendToBot(`#OPERASYON\nHedef: ${t}\nNot: ${n}\nAjan: ${currentAgent}`);
            logToConsole("Operasyon emri database'e işlendi.");
        }
    }
</script>
</body>
</html>
